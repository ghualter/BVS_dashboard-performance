/* COTIZACIONES T1                                                */
/* ══════════════════════════════════════════════════════════════ */
function SecCotizaciones(){
  const [search,setSearch]=useState('');
  const [fEstado,setFEstado]=useState('Todos');
  const [fTipo,setFTipo]=useState('Todos');
  const [fTerr,setFTerr]=useState('Todos');
  const [fMes,setFMes]=useState('Todos');
  const [sort,setSort]=useState('monto');
  const [selected,setSelected]=useState(null);
  const meses=useMemo(()=>['Todos',...[...new Set(T1_RAW.map(d=>d.Mes).filter(Boolean))]],'');
  const clienteMap=useMemo(()=>{const m={};T1_RAW.forEach(d=>{if(!m[d.Cliente])m[d.Cliente]=[];m[d.Cliente].push(d);});return m;},[]);
  const filtered=useMemo(()=>Object.entries(clienteMap)
    .filter(([c])=>c.toLowerCase().includes(search.toLowerCase()))
    .filter(([,cs])=>{
      if(fEstado!=='Todos'&&!cs.some(c=>c.Estado===fEstado))return false;
      if(fTipo!=='Todos'&&!cs.some(c=>c.Tipo_Venta===fTipo))return false;
      if(fTerr==='Territorio'&&!cs.some(c=>c.En_Territorio==='Si'))return false;
      if(fTerr==='Externo'&&!cs.some(c=>c.En_Territorio==='No'))return false;
      if(fMes!=='Todos'&&!cs.some(c=>c.Mes===fMes))return false;
      return true;
    })
    .sort((a,b)=>sort==='monto'?b[1].reduce((s,c)=>s+c.Monto,0)-a[1].reduce((s,c)=>s+c.Monto,0)
      :sort==='nombre'?a[0].localeCompare(b[0]):b[1].length-a[1].length)
  ,[clienteMap,search,fEstado,fTipo,fTerr,fMes,sort]);
  const selCots=useMemo(()=>{if(!selected)return[];let cs=clienteMap[selected]||[];
    if(fEstado!=='Todos')cs=cs.filter(c=>c.Estado===fEstado);
    if(fMes!=='Todos')cs=cs.filter(c=>c.Mes===fMes);
    return cs.sort((a,b)=>new Date(b.fecha_str)-new Date(a.fecha_str));
  },[selected,clienteMap,fEstado,fMes]);
  return(
    <div className="fade-in">
      <div style={{background:'#fff',borderRadius:14,border:'1px solid #e2e8f0',padding:'12px 16px',marginBottom:14,display:'flex',flexWrap:'wrap',gap:8,alignItems:'center',boxShadow:'0 1px 4px rgba(0,0,0,.05)'}}>
        <input type="text" placeholder="🔍 Buscar cliente..." value={search} onChange={e=>setSearch(e.target.value)}
          style={{border:'1px solid #e2e8f0',borderRadius:8,padding:'7px 12px',fontSize:13,flex:1,minWidth:160,outline:'none'}}/>
        {[[fEstado,setFEstado,['Todos','Lograda','Por confirmar','Perdido','Se actualizó'],'Estado'],
          [fTipo,setFTipo,['Todos','Renovación','Nueva'],'Tipo'],
          [fTerr,setFTerr,['Todos','Territorio','Externo'],'Territorio'],
          [fMes,setFMes,meses,'Mes']].map(([val,set,opts,ph],i)=>(
          <select key={i} value={val} onChange={e=>set(e.target.value)}
            style={{border:'1px solid #e2e8f0',borderRadius:8,padding:'7px 10px',fontSize:13,outline:'none',background:'#fff'}}>
            {opts.map(o=><option key={o}>{o}</option>)}
          </select>
        ))}
        <select value={sort} onChange={e=>setSort(e.target.value)}
          style={{border:'1px solid #e2e8f0',borderRadius:8,padding:'7px 10px',fontSize:13,outline:'none',background:'#fff'}}>
          <option value="monto">Monto ↓</option><option value="nombre">Nombre A–Z</option><option value="cotizaciones"># Cotiz. ↓</option>
        </select>
        {selected&&<button onClick={()=>setSelected(null)} style={{fontSize:12,color:'#94a3b8',background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}}>Limpiar</button>}
      </div>
      <div style={{fontSize:11,color:'#94a3b8',marginBottom:10}}>{filtered.length} clientes encontrados</div>
      <div className="flex gap-4">
        <div style={{flex:selected?'0 0 38%':'1',transition:'flex .3s'}}>
          <div className={`grid gap-3 ${selected?'':'sm:grid-cols-2 lg:grid-cols-3'}`}>
            {filtered.map(([c,cs])=><ClientCard key={c} cliente={c} cots={cs} selected={selected} onClick={setSelected}/>)}
          </div>
        </div>
        {selected&&(
          <div style={{flex:'0 0 60%',position:'sticky',top:12,alignSelf:'start'}} className="fade-in">
            <div style={{background:'#fff',borderRadius:16,border:'1px solid #e2e8f0',overflow:'hidden',boxShadow:'0 4px 20px rgba(30,58,138,.08)'}}>
              <div style={{background:'linear-gradient(135deg,#0f172a,#1e3a8a)',padding:'14px 18px'}}>
                <div className="flex justify-between items-center mb-2">
                  <div style={{fontWeight:700,color:'#fff',fontSize:16}}>{selected}</div>
                  <button onClick={()=>setSelected(null)} style={{color:'#93c5fd',background:'none',border:'none',fontSize:22,cursor:'pointer'}}>×</button>
                </div>
                <div className="flex gap-2 flex-wrap">
                  {(()=>{const cs=clienteMap[selected]||[];const seg=cs[0]?.Segmento;const enT=cs.some(c=>c.En_Territorio==='Si');
                  const oppCrm=T5_RAW.filter(r=>r.cuenta===cs[0]?.Cuenta_Territorio);
                  const renov=cs.filter(c=>c.isRenovacion);
                  return[seg&&<SegBadge key="seg" s={seg}/>,
                    <span key="terr" style={{background:enT?'rgba(34,197,94,.25)':'rgba(255,255,255,.1)',color:enT?'#86efac':'#93c5fd',borderRadius:99,padding:'2px 8px',fontSize:11}}>{enT?'En Territorio':'Externo'}</span>,
                    oppCrm.length>0&&<span key="crm" style={{background:'#049fd9',color:'#fff',borderRadius:99,padding:'2px 8px',fontSize:11,fontWeight:600}}>🔵 {oppCrm.length} opps CRM</span>,
                    renov.length>0&&<span key="renov" style={{background:'rgba(124,58,237,.4)',color:'#e9d5ff',borderRadius:99,padding:'2px 8px',fontSize:11}}>🔄 {renov.length} renovaciones</span>
                  ];})()}
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',borderBottom:'1px solid #f1f5f9'}}>
                {(()=>{const all=clienteMap[selected]||[];
                const l=all.filter(c=>c.Estado==='Lograda'),p=all.filter(c=>c.Estado==='Por confirmar'),pe=all.filter(c=>c.Estado==='Perdido');
                return[['Total',fmt(all.reduce((s,c)=>s+c.Monto,0)),'#0f172a'],
                       [`${l.length} Logradas`,fmt(l.reduce((s,c)=>s+c.Monto,0)),'#16a34a'],
                       [`${p.length} Pipeline`,fmt(p.reduce((s,c)=>s+c.Monto,0)),'#d97706'],
                       [`${pe.length} Perdidas`,fmt(pe.reduce((s,c)=>s+c.Monto,0)),'#dc2626']]
                .map(([l2,v,tc])=>(
                  <div key={l2} style={{padding:'10px',textAlign:'center',borderRight:'1px solid #f1f5f9'}}>
                    <div style={{fontSize:10,color:'#94a3b8',marginBottom:2}}>{l2}</div>
                    <div style={{fontSize:12,fontWeight:700,color:tc}}>{v}</div>
                  </div>
                ));})()}
              </div>
              {(()=>{const ct=clienteMap[selected]?.[0]?.Cuenta_Territorio;const opps=T5_RAW.filter(r=>r.cuenta===ct);
              if(!opps.length)return null;
              return(<div style={{margin:'10px 14px',background:'#eff6ff',borderRadius:10,padding:'10px 14px',border:'1px solid #bfdbfe'}}>
                <div style={{fontSize:11,fontWeight:700,color:'#1e40af',marginBottom:8}}>🔵 OPORTUNIDADES CRM — {opps.length} activas · {fmt(opps.reduce((s,r)=>s+r.ingresos,0))}</div>
                {opps.map(op=>(
                  <div key={op.op_id} style={{fontSize:11,padding:'4px 0',borderBottom:'1px solid #dbeafe',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span style={{color:'#374151',flex:1}}>{op.tema?.slice(0,55)}{op.tema?.length>55?'…':''}</span>
                    <div className="flex gap-1 items-center ml-2"><FabBadge f={op.fabricante}/><span style={{fontWeight:700,color:'#1e40af',minWidth:70,textAlign:'right'}}>{fmt(op.ingresos)}</span></div>
                  </div>
                ))}
              </div>);})()}
              <div style={{padding:'0 14px 14px',overflowY:'auto',maxHeight:360}}>
                <div style={{fontSize:11,fontWeight:600,color:'#94a3b8',margin:'12px 0 8px',textTransform:'uppercase'}}>Cotizaciones ({selCots.length})</div>
                {selCots.map(c=><CotRow key={c.Codigo} c={c}/>)}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function ClientCard({cliente,cots,selected,onClick}){
  const log=cots.filter(c=>c.Estado==='Lograda'),pip=cots.filter(c=>c.Estado==='Por confirmar'),per=cots.filter(c=>c.Estado==='Perdido');
  const total=cots.reduce((s,c)=>s+c.Monto,0),logM=log.reduce((s,c)=>s+c.Monto,0);
  const seg=cots[0]?.Segmento||'',enT=cots.some(c=>c.En_Territorio==='Si');
  const ciscoM=cots.filter(c=>isCisco(c)).reduce((s,c)=>s+c.Monto,0),ciscoSh=pct(ciscoM,total);
  const crmOpps=T5_RAW.filter(r=>r.cuenta===cots[0]?.Cuenta_Territorio);
  const renovs=cots.filter(c=>c.isRenovacion);
  const ini=cliente.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
  const isSel=selected===cliente;
  return(
    <div onClick={()=>onClick(cliente)} className="card-hover fade-in"
      style={{borderRadius:14,border:`2px solid ${isSel?'#2563eb':'#e2e8f0'}`,background:isSel?'#eff6ff':'#fff',cursor:'pointer',padding:14,transition:'all .18s'}}>
      <div className="flex items-start gap-3 mb-3">
        <div style={{width:38,height:38,borderRadius:'50%',background:'linear-gradient(135deg,#1e40af,#3b82f6)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:12,flexShrink:0}}>{ini}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,color:'#0f172a',fontSize:13,lineHeight:1.3,marginBottom:4}}>{cliente}</div>
          <div className="flex flex-wrap gap-1">
            <SegBadge s={seg}/>
            <span className="badge" style={{background:enT?'#d1fae5':'#f1f5f9',color:enT?'#065f46':'#64748b'}}>{enT?'Territorio':'Externo'}</span>
            {crmOpps.length>0&&<span className="badge" style={{background:'#e0f5fc',color:'#0369a1'}}>🔵 {crmOpps.length} CRM</span>}
            {renovs.length>0&&<span className="badge" style={{background:'#f5f3ff',color:'#7c3aed'}}>🔄 {renovs.length}</span>}
          </div>
        </div>
      </div>
      <div className="grid grid-cols-3 gap-1.5 mb-3">
        {[['✓',log.length,'#dcfce7','#166534'],['⏳',pip.length,'#fef9c3','#854d0e'],['✕',per.length,'#fee2e2','#991b1b']].map(([ic,v,bg,tc])=>(
          <div key={ic} style={{background:bg,borderRadius:8,padding:'5px 4px',textAlign:'center'}}>
            <div style={{fontSize:9,color:tc,opacity:.7}}>{ic}</div>
            <div style={{fontSize:13,fontWeight:700,color:tc}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{borderTop:'1px solid #f1f5f9',paddingTop:8}}>
        <div className="flex justify-between items-center">
          <span style={{fontSize:11,color:'#94a3b8'}}>{cots.length} cotiz.</span>
          <span style={{fontSize:14,fontWeight:700,color:'#0f172a'}}>{fmt(total)}</span>
        </div>
        {logM>0&&<div style={{marginTop:6}}>
          <div className="flex justify-between" style={{fontSize:10,color:'#64748b',marginBottom:2}}><span>Logrado</span><span style={{color:'#16a34a',fontWeight:600}}>{fmt(logM)}</span></div>
          <div style={{height:4,background:'#f1f5f9',borderRadius:99,overflow:'hidden'}}><div style={{height:'100%',width:`${Math.min(100,pct(logM,total))}%`,background:'linear-gradient(90deg,#4ade80,#16a34a)',borderRadius:99}}/></div>
        </div>}
        {ciscoSh>0&&<div style={{marginTop:5,display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:10,color:'#0369a1'}}>🔵 Cisco</span>
          <div style={{flex:1,height:3,background:'#e0f2fe',borderRadius:99,overflow:'hidden'}}><div style={{height:'100%',width:`${Math.min(100,ciscoSh)}%`,background:'#0ea5e9',borderRadius:99}}/></div>
          <span style={{fontSize:10,fontWeight:600,color:'#0369a1'}}>{ciscoSh}%</span>
        </div>}
      </div>
    </div>
  );
}

function CotRow({c}){
  const cfgs={Lograda:{bg:'#dcfce7',tc:'#166534',dot:'#22c55e'},'Por confirmar':{bg:'#fef9c3',tc:'#854d0e',dot:'#eab308'},Perdido:{bg:'#fee2e2',tc:'#991b1b',dot:'#ef4444'},'Se actualizó':{bg:'#dbeafe',tc:'#1e40af',dot:'#60a5fa'}};
  const cfg=cfgs[c.Estado]||cfgs['Se actualizó'];
  return(
    <div style={{background:'#fff',borderRadius:10,border:'1px solid #e2e8f0',padding:'10px 12px',marginBottom:6}}>
      <div className="flex items-start justify-between gap-2 mb-2">
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:10,color:'#94a3b8',fontFamily:'monospace',marginBottom:1}}>{c.Codigo}</div>
          <div style={{fontSize:12,fontWeight:600,color:'#1e293b',lineHeight:1.35}}>{c.Referencia}</div>
        </div>
        <div style={{fontSize:14,fontWeight:700,color:'#1e293b',whiteSpace:'nowrap'}}>{fmt(c.Monto)}</div>
      </div>
      <div className="flex items-center gap-1.5 flex-wrap">
        <span className="badge" style={{background:cfg.bg,color:cfg.tc}}><span style={{width:5,height:5,borderRadius:'50%',background:cfg.dot,display:'inline-block'}}></span>{c.Estado}</span>
        <span style={{fontSize:11,color:'#94a3b8'}}>{fmtD(c.fecha_str)}</span>
        {c.isRenovacion&&<span className="badge" style={{background:'#f5f3ff',color:'#7c3aed'}}>🔄 Renovación</span>}
        {isCisco(c)&&<span className="badge" style={{background:'#e0f5fc',color:'#0369a1'}}>🔵 Cisco</span>}
        {c.Q_Cierre&&<span className="badge" style={{background:'#dbeafe',color:'#1e40af'}}>{c.Q_Cierre}</span>}

      </div>
    </div>
  );
}

/* CRM T5                                                         */
/* ══════════════════════════════════════════════════════════════ */
function SecCRM(){
  const [fFab,setFab]=useState('Todos');
  const [fFase,setFase]=useState('Todos');
  const [fFcst,setFcst]=useState('Todos');
  const [search,setSearch]=useState('');
  const [sort,setSort]=useState('ingresos');
  const fabs=['Todos',...[...new Set(T5_RAW.map(r=>r.fabricante).filter(Boolean))].sort()];
  const fases=['Todos',...[...new Set(T5_RAW.map(r=>r.fase).filter(Boolean))].sort()];
  const fcsts=['Todos',...[...new Set(T5_RAW.map(r=>r.fcst_status).filter(Boolean))].sort()];
  const filtered=useMemo(()=>T5_RAW
    .filter(r=>fFab==='Todos'||r.fabricante===fFab)
    .filter(r=>fFase==='Todos'||r.fase===fFase)
    .filter(r=>fFcst==='Todos'||r.fcst_status===fFcst)
    .filter(r=>!search||(r.cuenta||'').toLowerCase().includes(search.toLowerCase())||(r.tema||'').toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>sort==='ingresos'?b.ingresos-a.ingresos:sort==='cuenta'?a.cuenta?.localeCompare(b.cuenta||''):new Date(a.fecha_cierre_str)-new Date(b.fecha_cierre_str))
  ,[fFab,fFase,fFcst,search,sort]);
  const totals=useMemo(()=>({total:filtered.reduce((s,r)=>s+r.ingresos,0),gan:filtered.reduce((s,r)=>s+r.ganancia_abs,0),n:filtered.length}),[filtered]);
  return(
    <div className="fade-in">
      <div className="grid gap-3 mb-4" style={{gridTemplateColumns:'repeat(4,minmax(0,1fr))'}}>
        {[{l:'Pipeline filtrado',v:fmt(totals.total),s:`${totals.n} oportunidades`},
          {l:'Ganancia estimada',v:fmt(totals.gan),s:'margen ~18% promedio'},
          {l:'Commit + Strong',v:fmt(filtered.filter(r=>r.fcst_status==='Commit'||r.fcst_status==='Strong Upside').reduce((s,r)=>s+r.ingresos,0)),s:'alta probabilidad'},
          {l:'Alertas semáforo',v:String(filtered.filter(r=>r.semaforo==='Alerta').length),s:`${fmt(filtered.filter(r=>r.semaforo==='Alerta').reduce((s,r)=>s+r.ingresos,0))} en riesgo timing`},
        ].map(k=>(
          <div key={k.l} style={{background:'#fff',borderRadius:12,border:'1px solid #e2e8f0',padding:'12px 14px',boxShadow:'0 1px 4px rgba(0,0,0,.04)'}}>
            <div style={{fontSize:11,color:'#64748b',marginBottom:3}}>{k.l}</div>
            <div style={{fontSize:18,fontWeight:700,color:'#0f172a'}}>{k.v}</div>
            <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{k.s}</div>
          </div>
        ))}
      </div>
      <div style={{background:'#fff',borderRadius:12,border:'1px solid #e2e8f0',padding:'10px 14px',marginBottom:12,display:'flex',flexWrap:'wrap',gap:8,alignItems:'center'}}>
        <input type="text" placeholder="🔍 Buscar cuenta u oportunidad..." value={search} onChange={e=>setSearch(e.target.value)}
          style={{border:'1px solid #e2e8f0',borderRadius:8,padding:'6px 12px',fontSize:13,flex:1,minWidth:180,outline:'none'}}/>
        {[[fFab,setFab,fabs],[fFase,setFase,fases],[fFcst,setFcst,fcsts]].map(([val,set,opts],i)=>(
          <select key={i} value={val} onChange={e=>set(e.target.value)}
            style={{border:'1px solid #e2e8f0',borderRadius:8,padding:'6px 10px',fontSize:13,outline:'none',background:'#fff'}}>
            {opts.map(o=><option key={o}>{o}</option>)}
          </select>
        ))}
        <select value={sort} onChange={e=>setSort(e.target.value)}
          style={{border:'1px solid #e2e8f0',borderRadius:8,padding:'6px 10px',fontSize:13,outline:'none',background:'#fff'}}>
          <option value="ingresos">Valor ↓</option><option value="cuenta">Cuenta A–Z</option><option value="fecha">Cierre ↑</option>
        </select>
      </div>
      <div style={{background:'#fff',borderRadius:14,border:'1px solid #e2e8f0',overflow:'hidden'}}>

                    <td style={{maxWidth:240}}>
                      <div style={{fontSize:12,color:'#374151',lineHeight:1.35}}>{r.tema}</div>

/* RENOVACIONES                                                   */
/* ══════════════════════════════════════════════════════════════ */
function SecRenovaciones(){
  const [fEstado,setFEstado]=useState('Todos');
  const [search,setSearch]=useState('');
  const renovs=T1_RAW.filter(r=>r.isRenovacion);
  const filtered=useMemo(()=>renovs
    .filter(r=>fEstado==='Todos'||r.Estado===fEstado)
    .filter(r=>!search||(r.Cliente||'').toLowerCase().includes(search.toLowerCase())||(r.Referencia||'').toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>b.Monto-a.Monto)
  ,[fEstado,search]);

  const urgentes=renovs.filter(r=>r.Antigüedad_Dias>60&&r.Estado==='Por confirmar');
  const proximos=renovs.filter(r=>r.Antigüedad_Dias>30&&r.Antigüedad_Dias<=60&&r.Estado==='Por confirmar');
  const logradas=renovs.filter(r=>r.Estado==='Lograda');
  const perdidas=renovs.filter(r=>r.Estado==='Perdido');

  // By tipo (1 año, 2 años, 3 años) from referencia
  const getYears=ref=>{
    if(/03\sAÑO|3\sAÑOS/i.test(ref))return'3 años';
    if(/02\sAÑO|2\sAÑOS/i.test(ref))return'2 años';
    if(/01\sAÑO|1\sAÑO/i.test(ref))return'1 año';
    return'N/D';
  };
  const byYears={};
  renovs.forEach(r=>{const y=getYears(r.Referencia);byYears[y]=(byYears[y]||0)+r.Monto;});

  return(
    <div className="fade-in">
      {/* KPI cards */}
      <div className="grid gap-3 mb-4" style={{gridTemplateColumns:'repeat(5,minmax(0,1fr))'}}>
        {[
          {l:'Total Renovaciones',v:renovs.length,s:fmt(renovs.reduce((s,r)=>s+r.Monto,0)),c:'#7c3aed'},
          {l:'🔴 Urgentes (>60d)',v:urgentes.length,s:fmt(urgentes.reduce((s,r)=>s+r.Monto,0)),c:'#dc2626'},
          {l:'🟡 Próximos (>30d)',v:proximos.length,s:fmt(proximos.reduce((s,r)=>s+r.Monto,0)),c:'#d97706'},
          {l:'✅ Logradas',v:logradas.length,s:fmt(logradas.reduce((s,r)=>s+r.Monto,0)),c:'#16a34a'},
          {l:'❌ Perdidas',v:perdidas.length,s:fmt(perdidas.reduce((s,r)=>s+r.Monto,0)),c:'#dc2626'},
        ].map(k=>(
          <div key={k.l} style={{background:'#fff',borderRadius:12,border:'1px solid #e2e8f0',padding:'12px 14px',boxShadow:'0 1px 4px rgba(0,0,0,.04)'}}>
            <div style={{fontSize:11,color:'#64748b',marginBottom:3}}>{k.l}</div>
            <div style={{fontSize:24,fontWeight:700,color:k.c}}>{k.v}</div>
            <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{k.s}</div>
          </div>
        ))}
      </div>

      <div className="grid gap-4 mb-4" style={{gridTemplateColumns:'1fr 1fr'}}>
        {/* Urgentes panel */}
        {urgentes.length>0&&(
          <div style={{background:'#fff',borderRadius:14,border:'1px solid #fecaca',padding:'14px',boxShadow:'0 1px 4px rgba(0,0,0,.04)'}}>
            <div style={{fontWeight:700,fontSize:13,color:'#991b1b',marginBottom:10}}>🔴 Renovaciones URGENTES — más de 60 días</div>
            {urgentes.sort((a,b)=>b.Antigüedad_Dias-a.Antigüedad_Dias).map(r=>(
              <div key={r.Codigo} className="renov-card renov-urgente" style={{marginBottom:8}}>
                <div className="flex justify-between items-start">
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13,color:'#0f172a'}}>{r.Cliente}</div>
                    <div style={{fontSize:11,color:'#64748b',marginTop:2,lineHeight:1.3}}>{r.Referencia?.slice(0,70)}</div>
                  </div>
                  <div style={{textAlign:'right',marginLeft:8}}>
                    <div style={{fontWeight:700,color:'#dc2626'}}>{fmt(r.Monto)}</div>
                    <div style={{fontSize:10,color:'#dc2626',fontWeight:600}}>{Math.round(r.Antigüedad_Dias)}d</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
        {/* Por plazo */}
        <div style={{background:'#fff',borderRadius:14,border:'1px solid #e2e8f0',padding:'14px',boxShadow:'0 1px 4px rgba(0,0,0,.04)'}}>
          <div style={{fontWeight:700,fontSize:13,color:'#374151',marginBottom:10}}>📋 Renovaciones por Plazo de Contrato</div>
          {Object.entries(byYears).sort((a,b)=>b[1]-a[1]).map(([yr,monto])=>{
            const n=renovs.filter(r=>getYears(r.Referencia)===yr).length;
            const tot=renovs.reduce((s,r)=>s+r.Monto,0);
            return(
              <div key={yr} style={{marginBottom:10}}>
                <div className="flex justify-between" style={{fontSize:12,marginBottom:3}}>
                  <span style={{fontWeight:600,color:'#374151'}}>{yr}</span>
                  <span style={{color:'#7c3aed',fontWeight:700}}>{fmt(monto)} <span style={{color:'#94a3b8',fontWeight:400}}>· {n} ops</span></span>
                </div>
                <div style={{height:6,background:'#f1f5f9',borderRadius:99,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${pct(monto,tot)}%`,background:'linear-gradient(90deg,#8b5cf6,#7c3aed)',borderRadius:99}}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Tabla completa */}
      <div style={{background:'#fff',borderRadius:14,border:'1px solid #e2e8f0',overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,.04)'}}>
        <div style={{padding:'12px 16px',borderBottom:'1px solid #f1f5f9',display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <div style={{fontWeight:700,fontSize:14,color:'#374151',marginRight:'auto'}}>🔄 Todas las Renovaciones ({renovs.length})</div>
          <input type="text" placeholder="🔍 Buscar..." value={search} onChange={e=>setSearch(e.target.value)}
            style={{border:'1px solid #e2e8f0',borderRadius:8,padding:'6px 12px',fontSize:13,width:200,outline:'none'}}/>
          <select value={fEstado} onChange={e=>setFEstado(e.target.value)}
            style={{border:'1px solid #e2e8f0',borderRadius:8,padding:'6px 10px',fontSize:13,outline:'none',background:'#fff'}}>
            {['Todos','Lograda','Por confirmar','Perdido','Se actualizó'].map(o=><option key={o}>{o}</option>)}
          </select>
        </div>
        <div style={{overflowX:'auto'}}>
          <table className="tbl">
            <thead><tr>
              <th>Cliente</th><th>Referencia</th><th>Plazo</th><th style={{textAlign:'right'}}>Monto</th>
              <th>Fecha Envío</th><th>Estado</th><th>Antigüedad</th><th>Alerta</th>
            </tr></thead>
            <tbody>
              {filtered.map(r=>{
                const dias=Math.round(r.Antigüedad_Dias);
                const alerta=dias>60?{t:'🔴 URGENTE',c:'#fee2e2',tc:'#991b1b'}:dias>30?{t:'🟡 Próximo',c:'#fef9c3',tc:'#854d0e'}:dias>0?{t:'🟢 Al día',c:'#dcfce7',tc:'#166534'}:{t:'–',c:'#f1f5f9',tc:'#64748b'};
                return(
                  <tr key={r.Codigo}>
                    <td style={{fontWeight:600,whiteSpace:'nowrap'}}>{r.Cliente}</td>
                    <td style={{fontSize:11,maxWidth:280,color:'#374151'}}>{r.Referencia}</td>
                    <td><span className="badge" style={{background:'#f5f3ff',color:'#7c3aed'}}>{getYears(r.Referencia)}</span></td>
                    <td style={{textAlign:'right',fontWeight:700}}>{fmt(r.Monto)}</td>
                    <td style={{fontSize:11,whiteSpace:'nowrap'}}>{fmtD(r.fecha_str)}</td>
                    <td><EstBadge e={r.Estado}/></td>
                    <td style={{textAlign:'center'}}>{dias>0?<span style={{fontSize:11,fontWeight:600,color:dias>60?'#dc2626':dias>30?'#d97706':'#64748b'}}>{dias}d</span>:<span style={{fontSize:11,color:'#94a3b8'}}>–</span>}</td>
                    <td><span className="badge" style={{background:alerta.c,color:alerta.tc}}>{alerta.t}</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* HISTÓRICO 2024 + 2025 + 2026                                   */
/* ══════════════════════════════════════════════════════════════ */
function SecHistorico(){
  const [fYear,setYear]=useState('Todos');
  const [search,setSearch]=useState('');

  const allData=[
    ...HIST['2024'].map(r=>({...r,year:'2024'})),
    ...HIST['2025'].map(r=>({...r,year:'2025'})),
    ...HIST['2026'].map(r=>({...r,year:'2026'})),
  ];
  const filtered=useMemo(()=>allData
    .filter(r=>fYear==='Todos'||r.year===fYear)
    .filter(r=>!search||(r.cuenta||'').toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>b.ingresos-a.ingresos)
  ,[fYear,search]);

  const tot24=HIST['2024'].reduce((s,r)=>s+r.ingresos,0);
  const tot25=HIST['2025'].reduce((s,r)=>s+r.ingresos,0);
  const tot26=HIST['2026'].reduce((s,r)=>s+r.ingresos,0);
  const totAll=tot24+tot25+tot26;

  // By account across years
  const byAcct={};
  allData.forEach(r=>{
    if(!byAcct[r.cuenta])byAcct[r.cuenta]={total:0,'2024':0,'2025':0,'2026':0};
    byAcct[r.cuenta].total+=r.ingresos;
    byAcct[r.cuenta][r.year]+=r.ingresos;
  });
  const topAccts=Object.entries(byAcct).sort((a,b)=>b[1].total-a[1].total).slice(0,10);

  // By fabricante
  const byFab={};
  allData.forEach(r=>{if(r.fabricante&&r.fabricante!=='nan')byFab[r.fabricante]=(byFab[r.fabricante]||0)+r.ingresos;});
  const topFabs=Object.entries(byFab).sort((a,b)=>b[1]-a[1]).slice(0,6);

  useChart('ch-hist-years',{type:'bar',
    data:{labels:['2024','2025','2026 YTD'],
      datasets:[{data:[tot24,tot25,tot26],backgroundColor:['#3b82f6','#8b5cf6','#22c55e'],borderRadius:8,borderWidth:0,label:'Vendido'}]},
    options:{maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${fmt(c.raw)}`}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:12,weight:'bold'}}},y:{ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'K',font:{size:10}},grid:{color:'#f1f5f9'}}}}});

  useChart('ch-hist-fab',{type:'doughnut',
    data:{labels:topFabs.map(([f])=>f),
      datasets:[{data:topFabs.map(([,v])=>v),backgroundColor:['#0369a1','#7c3aed','#16a34a','#d97706','#dc2626','#0891b2'],borderWidth:2,borderColor:'#fff'}]},
    options:{cutout:'55%',maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10}},tooltip:{callbacks:{label:c=>`${c.label}: ${fmt(c.raw)}`}}}}});

  return(
    <div className="fade-in">
      {/* KPI summary */}
      <div className="grid gap-3 mb-4" style={{gridTemplateColumns:'repeat(4,minmax(0,1fr))'}}>
        {[
          {l:'Total 2024',v:fmt(tot24),s:`${HIST['2024'].length} operaciones`,c:'#3b82f6'},
          {l:'Total 2025',v:fmt(tot25),s:`${HIST['2025'].length} operaciones`,c:'#8b5cf6'},
          {l:'2026 YTD',v:fmt(tot26),s:`${HIST['2026'].length} operaciones`,c:'#16a34a'},
          {l:'Total Histórico',v:fmt(totAll),s:`${allData.length} operaciones`,c:'#0f172a'},
        ].map(k=>(
          <div key={k.l} style={{background:'#fff',borderRadius:12,border:'1px solid #e2e8f0',padding:'14px',boxShadow:'0 1px 4px rgba(0,0,0,.04)'}}>
            <div style={{fontSize:11,color:'#64748b',marginBottom:4}}>{k.l}</div>
            <div style={{fontSize:20,fontWeight:700,color:k.c}}>{k.v}</div>
            <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{k.s}</div>
          </div>
        ))}
      </div>

      {/* Trend vs current year */}
      <div style={{background:'linear-gradient(135deg,#1e3a8a,#1d4ed8)',borderRadius:14,padding:'16px 20px',marginBottom:16,color:'#fff'}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:8}}>📈 Tendencia de Ventas — Variación año a año</div>
        <div className="grid gap-4" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
          {[['2024 vs 2025',tot24,tot25],['2025 vs 2026*',tot25,tot26*12/3]].map(([lbl,prev,curr])=>{
            const chg=pct(curr-prev,prev);
            return(
              <div key={lbl}>
                <div style={{fontSize:11,color:'#93c5fd',marginBottom:2}}>{lbl}</div>
                <div style={{fontSize:18,fontWeight:700,color:chg>=0?'#86efac':'#fca5a5'}}>{chg>=0?'+':''}{chg}%</div>
                <div style={{fontSize:10,color:'rgba(255,255,255,.5)'}}>{chg>=0?'▲ Crecimiento':'▼ Caída'}</div>
              </div>
            );
          })}
          <div>
            <div style={{fontSize:11,color:'#93c5fd',marginBottom:2}}>Proyección 2026</div>
            <div style={{fontSize:18,fontWeight:700,color:'#fde68a'}}>{fmt(tot26*4)}</div>
            <div style={{fontSize:10,color:'rgba(255,255,255,.5)'}}>*Extrapolado Q1 x4</div>
          </div>
        </div>
      </div>

      <div className="grid gap-4 mb-4" style={{gridTemplateColumns:'2fr 1fr'}}>
        <div className="chart-card">
          <div className="chart-title">Ventas por Año</div>
          <div style={{height:200}}><canvas id="ch-hist-years"/></div>
        </div>
        <div className="chart-card">
          <div className="chart-title">Mix por Fabricante (Histórico)</div>
          <div style={{height:200}}><canvas id="ch-hist-fab"/></div>
        </div>
      </div>

      {/* Top accounts */}
      <div className="panel-card">
        <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>🏆 Top 10 Cuentas — Histórico 2024–2026</div>
        <div style={{overflowX:'auto'}}>
          <table className="tbl">
            <thead><tr>
              <th>#</th><th>Cuenta</th><th style={{textAlign:'right'}}>2024</th><th style={{textAlign:'right'}}>2025</th>
              <th style={{textAlign:'right'}}>2026 YTD</th><th style={{textAlign:'right'}}>Total</th><th>Evolución</th>
            </tr></thead>
            <tbody>
              {topAccts.map(([cuenta,d],i)=>{
                const trend=d['2025']>d['2024']?'▲':'▼';
                const trendColor=d['2025']>d['2024']?'#16a34a':'#dc2626';
                return(
                  <tr key={cuenta}>
                    <td style={{color:'#94a3b8',fontWeight:700,width:30}}>{i+1}</td>
                    <td style={{fontWeight:700}}>{cuenta}</td>
                    <td style={{textAlign:'right',color:'#3b82f6'}}>{d['2024']>0?fmt(d['2024']):'–'}</td>
                    <td style={{textAlign:'right',color:'#8b5cf6'}}>{d['2025']>0?fmt(d['2025']):'–'}</td>
                    <td style={{textAlign:'right',color:'#16a34a'}}>{d['2026']>0?fmt(d['2026']):'–'}</td>
                    <td style={{textAlign:'right',fontWeight:700}}>{fmt(d.total)}</td>
                    <td style={{color:trendColor,fontWeight:700,fontSize:14}}>{d['2024']>0&&d['2025']>0?trend:'–'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* All transactions */}
      <div style={{background:'#fff',borderRadius:14,border:'1px solid #e2e8f0',overflow:'hidden'}}>
        <div style={{padding:'12px 16px',borderBottom:'1px solid #f1f5f9',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <div style={{fontWeight:700,fontSize:14,marginRight:'auto'}}>Todas las Operaciones Logradas</div>
          <input type="text" placeholder="🔍 Buscar cuenta..." value={search} onChange={e=>setSearch(e.target.value)}
            style={{border:'1px solid #e2e8f0',borderRadius:8,padding:'6px 12px',fontSize:13,width:180,outline:'none'}}/>
          <select value={fYear} onChange={e=>setYear(e.target.value)}
            style={{border:'1px solid #e2e8f0',borderRadius:8,padding:'6px 10px',fontSize:13,outline:'none',background:'#fff'}}>
            {['Todos','2024','2025','2026'].map(o=><option key={o}>{o}</option>)}
          </select>
        </div>
        <div style={{overflowX:'auto',maxHeight:400}}>
          <table className="tbl">
            <thead><tr><th>Año</th><th>Cuenta</th><th>Tema</th><th>Fabricante</th><th style={{textAlign:'right'}}>Ingresos</th></tr></thead>
            <tbody>
              {filtered.slice(0,100).map((r,i)=>(
                <tr key={i}>
                  <td><span className="badge" style={{background:r.year==='2024'?'#dbeafe':r.year==='2025'?'#f5f3ff':'#dcfce7',color:r.year==='2024'?'#1e40af':r.year==='2025'?'#7c3aed':'#166534'}}>{r.year}</span></td>
                  <td style={{fontWeight:600}}>{r.cuenta}</td>
                  <td style={{fontSize:11,maxWidth:280,color:'#374151'}}>{r.tema?.slice(0,70)}</td>
                  <td><FabBadge f={r.fabricante}/></td>
                  <td style={{textAlign:'right',fontWeight:700,color:'#16a34a'}}>{fmt(r.ingresos)}</td>
                </tr>
              ))}
            </tbody>
          </table>
          {filtered.length>100&&<div style={{textAlign:'center',padding:10,fontSize:11,color:'#94a3b8'}}>Mostrando 100 de {filtered.length} registros</div>}
        </div>
      </div>
    </div>
  );
}

/* ANÁLISIS CISCO                                                 */
/* ══════════════════════════════════════════════════════════════ */
function SecCisco(){
  const ciscoT1=T1_RAW.filter(r=>isCisco(r));
  const ciscoT5=T5_RAW.filter(r=>r.fabricante==='CISCO');
  const totalT1=T1_RAW.reduce((s,r)=>s+r.Monto,0);
  const totalT5=T5_RAW.reduce((s,r)=>s+r.ingresos,0);
  const ciscoT1M=ciscoT1.reduce((s,r)=>s+r.Monto,0);
  const ciscoT5M=ciscoT5.reduce((s,r)=>s+r.ingresos,0);
  const byFase={};ciscoT5.forEach(r=>{byFase[r.fase]=(byFase[r.fase]||0)+r.ingresos;});
  const byEstado={};ciscoT1.forEach(r=>{byEstado[r.Estado]=(byEstado[r.Estado]||0)+r.Monto;});

  useChart('ch-cisco-t1',{type:'doughnut',
    data:{labels:['Cisco','No Cisco'],datasets:[{data:[ciscoT1M,totalT1-ciscoT1M],backgroundColor:['#0369a1','#e0f2fe'],borderWidth:2,borderColor:'#fff'}]},
    options:{cutout:'60%',maintainAspectRatio:true,plugins:{legend:{labels:{font:{size:11},boxWidth:12}},tooltip:{callbacks:{label:c=>`${c.label}: ${fmt(c.raw)} (${pct(c.raw,totalT1)}%)`}}}}});

  const faseKeys=Object.keys(byFase);
  useChart('ch-cisco-fase',{type:'bar',
    data:{labels:faseKeys,datasets:[{data:faseKeys.map(k=>byFase[k]),backgroundColor:['#7c3aed','#0369a1','#16a34a','#d97706'],borderRadius:6,borderWidth:0}]},
    options:{maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}},grid:{display:false}},y:{ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'K',font:{size:10}},grid:{color:'#f1f5f9'}}}}});

  const estKeys=Object.keys(byEstado);
  useChart('ch-cisco-estados',{type:'doughnut',
    data:{labels:estKeys,datasets:[{data:estKeys.map(k=>byEstado[k]),backgroundColor:['#16a34a','#d97706','#dc2626','#2563eb'],borderWidth:2,borderColor:'#fff'}]},
    options:{cutout:'55%',maintainAspectRatio:true,plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10}}}}});

  return(
    <div className="fade-in">
      <div className="grid gap-3 mb-4" style={{gridTemplateColumns:'repeat(6,minmax(0,1fr))'}}>
        {[
          {l:'Cotizaciones Cisco T1',v:ciscoT1.length,s:`de ${T1_RAW.length} totales`,c:'#0369a1'},
          {l:'Monto Cisco T1',v:fmt(ciscoT1M),s:`${pct(ciscoT1M,totalT1)}% del funnel`,c:'#0f172a'},
          {l:'Logrado Cisco T1',v:fmt(ciscoT1.filter(r=>r.Estado==='Lograda').reduce((s,r)=>s+r.Monto,0)),s:`${ciscoT1.filter(r=>r.Estado==='Lograda').length} ops`,c:'#16a34a'},
          {l:'Opors. Cisco CRM',v:ciscoT5.length,s:`de ${T5_RAW.length} en T5`,c:'#7c3aed'},
          {l:'Ingresos Cisco T5',v:fmt(ciscoT5M),s:`${pct(ciscoT5M,totalT5)}% del CRM`,c:'#0369a1'},
          {l:'Meta Cisco 2026',v:'80%',s:'de ventas objetivo',c:'#d97706'},
        ].map(k=>(
          <div key={k.l} className="kpi-stat-box">
            <div className="kpi-stat-label">{k.l}</div>
            <div className="kpi-stat-value" style={{fontSize:18,color:k.c}}>{k.v}</div>
            <div className="kpi-stat-sub">{k.s}</div>
          </div>
        ))}
      </div>
      <div className="charts-grid mb-4">
        <div className="chart-card"><div className="chart-title">Monto Cisco vs No-Cisco (T1)</div><canvas id="ch-cisco-t1" style={{maxHeight:200}}/></div>
        <div className="chart-card"><div className="chart-title">Ingresos Cisco por Fase (T5)</div><canvas id="ch-cisco-fase" style={{maxHeight:200}}/></div>
        <div className="chart-card"><div className="chart-title">Estados Cisco T1 por Monto</div><canvas id="ch-cisco-estados" style={{maxHeight:200}}/></div>
      </div>
      <div className="panel-card">
        <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>Cotizaciones Cisco – T1</div>
        <div style={{overflowX:'auto'}}>
          <table className="tbl">
            <thead><tr><th>Código</th><th>Cliente</th><th>Referencia</th><th style={{textAlign:'right'}}>Monto</th><th>Estado</th><th>Tipo</th><th>Territorio</th></tr></thead>
            <tbody>
              {ciscoT1.sort((a,b)=>b.Monto-a.Monto).map(r=>(
                <tr key={r.Codigo}>
                  <td style={{fontSize:10,color:'#7c3aed',fontFamily:'monospace'}}>{r.Codigo}</td>
                  <td style={{fontWeight:600}}>{r.Cliente}</td>
                  <td style={{fontSize:12,maxWidth:280,color:'#374151'}}>{r.Referencia}</td>
                  <td style={{textAlign:'right',fontWeight:700,color:'#0369a1'}}>{fmt(r.Monto)}</td>
                  <td><EstBadge e={r.Estado}/></td>
                  <td>{r.isRenovacion&&<span className="badge" style={{background:'#f5f3ff',color:'#7c3aed'}}>🔄 Renov.</span>}</td>
                  <td><span className="badge" style={{background:r.En_Territorio==='Si'?'#dcfce7':'#f1f5f9',color:r.En_Territorio==='Si'?'#166534':'#64748b'}}>{r.En_Territorio==='Si'?'✓ Territorio':'Fuera'}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════ */
/* KPIs                                                           */
/* ══════════════════════════════════════════════════════════════ */
function SecKPIs(){
  const totalT1=T1_RAW.reduce((s,r)=>s+r.Monto,0);
  const logrado=T1_RAW.filter(r=>r.Estado==='Lograda').reduce((s,r)=>s+r.Monto,0);
  const perdido=T1_RAW.filter(r=>r.Estado==='Perdido').reduce((s,r)=>s+r.Monto,0);
  const porConf=T1_RAW.filter(r=>r.Estado==='Por confirmar').reduce((s,r)=>s+r.Monto,0);
  const actualizado=T1_RAW.filter(r=>r.Estado==='Se actualizó').reduce((s,r)=>s+r.Monto,0);
  const totalT5=T5_RAW.reduce((s,r)=>s+r.ingresos,0);
  const ciscoT5=T5_RAW.filter(r=>r.fabricante==='CISCO').reduce((s,r)=>s+r.ingresos,0);
  const byMes={};T1_RAW.forEach(r=>{if(r.Mes)byMes[r.Mes]=(byMes[r.Mes]||0)+r.Monto;});
  const mesKeys=Object.keys(byMes).sort();
  const byFab={};T5_RAW.forEach(r=>{if(r.fabricante)byFab[r.fabricante]=(byFab[r.fabricante]||0)+r.ingresos;});
  const fabKeys=Object.keys(byFab).sort((a,b)=>byFab[b]-byFab[a]).slice(0,8);
  const byFase={};T5_RAW.forEach(r=>{if(r.fase)byFase[r.fase]=(byFase[r.fase]||0)+r.ingresos;});
  const faseKeys=['1-Descubrimiento','2-Calificación','3-Propuesta','4-Negociación'].filter(k=>byFase[k]);
  const bySegT1={};T1_RAW.forEach(r=>{if(r.Segmento&&r.En_Territorio==='Si')bySegT1[r.Segmento]=(bySegT1[r.Segmento]||0)+r.Monto;});
  const segKeys=Object.keys(bySegT1).sort((a,b)=>bySegT1[b]-bySegT1[a]);

  useChart('ch-kpi-cuota',{type:'doughnut',
    data:{labels:['Logrado','Por Confirmar','Restante'],datasets:[{data:[logrado,porConf,Math.max(0,3000000-logrado-porConf)],backgroundColor:['#16a34a','#d97706','#e2e8f0'],borderWidth:2,borderColor:'#fff'}]},
    options:{cutout:'65%',maintainAspectRatio:true,plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10}},tooltip:{callbacks:{label:c=>`${c.label}: ${fmt(c.raw)}`}}}}});

  useChart('ch-kpi-funnel',{type:'bar',
    data:{labels:['Logrado','Por Conf.','Perdido','Actualizado'],datasets:[{data:[logrado,porConf,perdido,actualizado],backgroundColor:['#16a34a','#d97706','#dc2626','#2563eb'],borderRadius:6,borderWidth:0}]},
    options:{maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}},grid:{display:false}},y:{ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'K',font:{size:10}},grid:{color:'#f1f5f9'}}}}});

  useChart('ch-kpi-meses',{type:'bar',
    data:{labels:mesKeys,datasets:[{data:mesKeys.map(k=>byMes[k]),backgroundColor:'#7c3aed',borderRadius:6,borderWidth:0}]},
    options:{maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}},grid:{display:false}},y:{ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'K',font:{size:10}},grid:{color:'#f1f5f9'}}}}});

  useChart('ch-kpi-fabricantes',{type:'bar',
    data:{labels:fabKeys,datasets:[{data:fabKeys.map(k=>byFab[k]),backgroundColor:['#0369a1','#7c3aed','#16a34a','#d97706','#dc2626','#0891b2','#9333ea','#65a30d'],borderRadius:6,borderWidth:0}]},
    options:{indexAxis:'y',maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'K',font:{size:10}},grid:{color:'#f1f5f9'}},y:{ticks:{font:{size:10}},grid:{display:false}}}}});

  useChart('ch-kpi-seg',{type:'doughnut',
    data:{labels:segKeys,datasets:[{data:segKeys.map(k=>bySegT1[k]),backgroundColor:['#8b5cf6','#0369a1','#d97706','#16a34a','#dc2626'],borderWidth:2,borderColor:'#fff'}]},
    options:{cutout:'50%',maintainAspectRatio:true,plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10}}}}});

  useChart('ch-kpi-fases',{type:'bar',
    data:{labels:faseKeys,datasets:[{data:faseKeys.map(k=>byFase[k]),backgroundColor:['#e2e8f0','#fef9c3','#dbeafe','#dcfce7'],borderRadius:6,borderWidth:0}]},
    options:{maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9}},grid:{display:false}},y:{ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'K',font:{size:10}},grid:{color:'#f1f5f9'}}}}});

  return(
    <div className="fade-in">
      <div className="grid gap-3 mb-4" style={{gridTemplateColumns:'repeat(5,minmax(0,1fr))'}}>
        {[
          {l:'Avance YTD',v:`${pct(logrado,3000000)}%`,s:`${fmt(logrado)} vs ${fmt(3000000)}`,c:'#16a34a'},
          {l:'Win Rate',v:`${pct(logrado,logrado+perdido)}%`,s:'Logrado vs Perdido',c:'#0369a1'},
          {l:'Total Cotizaciones',v:T1_RAW.length,s:`${T1_RAW.filter(r=>r.En_Territorio==='Si').length} territorio`,c:'#7c3aed'},
          {l:'Pipeline CRM',v:fmt(totalT5),s:`${T5_RAW.length} oportunidades`,c:'#0f172a'},
          {l:'Cisco vs Meta 80%',v:`${pct(ciscoT5,totalT5)}%`,s:`Meta: 80% del pipeline`,c:pct(ciscoT5,totalT5)>=80?'#16a34a':'#dc2626'},
        ].map(k=>(
          <div key={k.l} className="kpi-stat-box">
            <div className="kpi-stat-label">{k.l}</div>
            <div className="kpi-stat-value" style={{color:k.c}}>{k.v}</div>
            <div className="kpi-stat-sub">{k.s}</div>
          </div>
        ))}
      </div>
      <div className="charts-grid">
        <div className="chart-card"><div className="chart-title">Avance vs Cuota 2026</div><canvas id="ch-kpi-cuota" style={{maxHeight:200}}/></div>
        <div className="chart-card"><div className="chart-title">Funnel por Estado (T1)</div><canvas id="ch-kpi-funnel" style={{maxHeight:200}}/></div>
        <div className="chart-card"><div className="chart-title">Cotizaciones por Mes</div><canvas id="ch-kpi-meses" style={{maxHeight:200}}/></div>
        <div className="chart-card"><div className="chart-title">Fabricantes CRM por Ingresos</div><canvas id="ch-kpi-fabricantes" style={{maxHeight:200}}/></div>
        <div className="chart-card"><div className="chart-title">Pipeline T1 por Segmento</div><canvas id="ch-kpi-seg" style={{maxHeight:200}}/></div>
        <div className="chart-card"><div className="chart-title">Fases Pipeline CRM</div><canvas id="ch-kpi-fases" style={{maxHeight:200}}/></div>
      </div>
      <div className="grid gap-4 mt-2" style={{gridTemplateColumns:'1fr 1fr'}}>
        <div className="panel-card">
          <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>📅 Cuota vs Avance por Trimestre</div>
          {[['Q1 (Ene–Mar)',600000,logrado],['Q2 (Abr–Jun)',750000,0],['Q3 (Jul–Sep)',750000,0],['Q4 (Oct–Dic)',900000,0]].map(([q,cuota,lg])=>{
            const p=pct(lg,cuota);
            return(
              <div key={q} style={{marginBottom:12}}>
                <div className="flex justify-between" style={{fontSize:12,marginBottom:3}}>
                  <span style={{fontWeight:600}}>{q}</span>
                  <span style={{color:'#64748b'}}>{fmt(lg)} / {fmt(cuota)}</span>
                  <span style={{fontWeight:700,color:p>=70?'#16a34a':lg>0?'#dc2626':'#94a3b8'}}>{p}%</span>
                </div>
                <div style={{height:8,background:'#f1f5f9',borderRadius:99,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${Math.min(100,p)}%`,borderRadius:99,background:p>=70?'linear-gradient(90deg,#4ade80,#16a34a)':lg>0?'linear-gradient(90deg,#fca5a5,#ef4444)':'#e2e8f0',transition:'width .6s ease'}}/>
                </div>
                {lg===0&&<div style={{fontSize:10,color:'#94a3b8',marginTop:2}}>Pendiente</div>}
                {p>0&&p<70&&<div style={{fontSize:10,color:'#dc2626',marginTop:2}}>⚠️ Below Target — meta {'>'}70%</div>}
              </div>
            );
          })}
        </div>
        <div className="panel-card">
          <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>💰 Pipeline T1 por Estado</div>
          {[['Logrado',logrado,'#16a34a'],['Por confirmar',porConf,'#d97706'],['Perdido',perdido,'#dc2626'],['Se actualizó',actualizado,'#2563eb']].map(([lbl,v,color])=>v>0?(
            <div key={lbl} style={{marginBottom:10}}>
              <div className="flex justify-between" style={{fontSize:12,marginBottom:3}}>
                <span style={{color:'#374151'}}>{lbl}</span>
                <span style={{fontWeight:700,color}}>{fmt(v)} <span style={{color:'#94a3b8',fontWeight:400}}>({pct(v,totalT1)}%)</span></span>
              </div>
              <div style={{height:6,background:'#f1f5f9',borderRadius:99,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${pct(v,totalT1)}%`,background:color,borderRadius:99}}/>
              </div>
            </div>
          ):null)}
        </div>
      </div>
    </div>
  );
}

/* APP */
function App(){
  const [section,setSection]=useState('cotizaciones');
  return(
    <div style={{minHeight:'100vh',background:'#f1f5f9'}}>
      <Header active={section} setSection={setSection}/>
      <div style={{maxWidth:1400,margin:'0 auto',padding:'1.2rem 1rem'}}>
        {section==='cotizaciones'&&<SecCotizaciones/>}
        {section==='crm'&&<SecCRM/>}
        {section==='renovaciones'&&<SecRenovaciones/>}
        {section==='historico'&&<SecHistorico/>}
        {section==='cisco'&&<SecCisco/>}
        {section==='kpis'&&<SecKPIs/>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
